<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0; url=https://apratimbh.github.io/">
    <link rel="canonical" href="https://apratimbh.github.io/">
    <meta name="robots" content="noindex">
    <script>
      // Faster than meta refresh; preserves no history entry
      location.replace("https://apratimbh.github.io/");
    </script>
  </head>
  <body>
    <p>If you are not redirected, <a href="https://apratimbh.github.io/">click here</a>.</p>
  </body>
</html>
